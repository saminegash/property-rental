<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Cityscape at twilight">
  <defs>
    <!-- Sky: deep navy → brand blue -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1e4a"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>

    <!-- Far layer of buildings -->
    <linearGradient id="far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>

    <!-- Near layer of buildings -->
    <linearGradient id="near" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1f47"/>
      <stop offset="100%" stop-color="#050b1f"/>
    </linearGradient>

    <!-- Soft moon halo -->
    <radialGradient id="moonGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fef3c7" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#fef3c7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fef3c7" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom vignette to keep text on top readable -->
    <linearGradient id="vignette" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#050b1f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050b1f" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="600" height="900" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#cbd5e1" opacity="0.55">
    <circle cx="60"  cy="120" r="1"/>
    <circle cx="145" cy="80"  r="1.2"/>
    <circle cx="230" cy="160" r="1"/>
    <circle cx="310" cy="60"  r="1.4"/>
    <circle cx="190" cy="220" r="1"/>
    <circle cx="500" cy="100" r="1"/>
    <circle cx="540" cy="180" r="1.2"/>
    <circle cx="80"  cy="240" r="1"/>
    <circle cx="380" cy="220" r="1"/>
    <circle cx="460" cy="280" r="1"/>
  </g>

  <!-- Moon glow + moon -->
  <circle cx="440" cy="190" r="180" fill="url(#moonGlow)"/>
  <circle cx="440" cy="190" r="38" fill="#fef3c7" opacity="0.92"/>
  <circle cx="430" cy="183" r="34" fill="#1e3a8a" opacity="0.18"/>

  <!-- Distant skyline (far layer) -->
  <g fill="url(#far)" opacity="0.65">
    <rect x="0"   y="500" width="60"  height="400"/>
    <rect x="55"  y="440" width="46"  height="460"/>
    <rect x="95"  y="510" width="58"  height="390"/>
    <rect x="150" y="470" width="50"  height="430"/>
    <rect x="195" y="520" width="62"  height="380"/>
    <rect x="250" y="440" width="55"  height="460"/>
    <rect x="300" y="495" width="48"  height="405"/>
    <rect x="345" y="460" width="60"  height="440"/>
    <rect x="400" y="430" width="52"  height="470"/>
    <rect x="448" y="500" width="58"  height="400"/>
    <rect x="500" y="465" width="50"  height="435"/>
    <rect x="545" y="510" width="55"  height="390"/>
  </g>

  <!-- Near skyline (foreground) -->
  <g fill="url(#near)">
    <!-- Slim tower with antenna -->
    <rect x="20" y="430" width="55" height="470"/>
    <rect x="42" y="395" width="11" height="40"/>
    <rect x="46" y="380" width="3" height="20"/>

    <!-- Wide office block -->
    <rect x="80" y="520" width="100" height="380"/>

    <!-- Stepped/setback tower -->
    <rect x="190" y="470" width="78" height="430"/>
    <rect x="205" y="420" width="48" height="60"/>
    <rect x="220" y="385" width="18" height="40"/>

    <!-- Angled-roof modern building -->
    <polygon points="278,470 330,440 340,440 340,900 278,900"/>

    <!-- Mid-rise -->
    <rect x="348" y="540" width="62" height="360"/>

    <!-- Tall thin condo -->
    <rect x="418" y="430" width="46" height="470"/>

    <!-- Twin tower base -->
    <rect x="470" y="500" width="42" height="400"/>
    <rect x="518" y="475" width="42" height="425"/>

    <!-- Small endcap -->
    <rect x="565" y="555" width="35" height="345"/>
  </g>

  <!-- Lit windows — warm amber for that "people are home" feeling -->
  <g fill="#fbbf24">
    <!-- Slim tower -->
    <rect x="30" y="470" width="6" height="6" opacity="0.9"/>
    <rect x="46" y="470" width="6" height="6" opacity="0.7"/>
    <rect x="62" y="470" width="6" height="6" opacity="0.85"/>
    <rect x="30" y="510" width="6" height="6" opacity="0.85"/>
    <rect x="62" y="510" width="6" height="6" opacity="0.6"/>
    <rect x="46" y="550" width="6" height="6" opacity="0.9"/>
    <rect x="30" y="590" width="6" height="6" opacity="0.75"/>
    <rect x="62" y="630" width="6" height="6" opacity="0.85"/>
    <rect x="30" y="670" width="6" height="6" opacity="0.6"/>
    <rect x="46" y="710" width="6" height="6" opacity="0.85"/>
    <rect x="62" y="750" width="6" height="6" opacity="0.7"/>
    <rect x="30" y="790" width="6" height="6" opacity="0.85"/>

    <!-- Office block (window band pattern) -->
    <g opacity="0.85">
      <rect x="92"  y="540" width="6" height="6"/>
      <rect x="110" y="540" width="6" height="6"/>
      <rect x="128" y="540" width="6" height="6" fill="#475569"/>
      <rect x="146" y="540" width="6" height="6"/>
      <rect x="164" y="540" width="6" height="6"/>

      <rect x="92"  y="580" width="6" height="6" fill="#475569"/>
      <rect x="110" y="580" width="6" height="6"/>
      <rect x="128" y="580" width="6" height="6"/>
      <rect x="146" y="580" width="6" height="6"/>
      <rect x="164" y="580" width="6" height="6" fill="#475569"/>

      <rect x="92"  y="620" width="6" height="6"/>
      <rect x="110" y="620" width="6" height="6"/>
      <rect x="128" y="620" width="6" height="6"/>
      <rect x="146" y="620" width="6" height="6" fill="#475569"/>
      <rect x="164" y="620" width="6" height="6"/>

      <rect x="92"  y="660" width="6" height="6" fill="#475569"/>
      <rect x="110" y="660" width="6" height="6"/>
      <rect x="128" y="660" width="6" height="6"/>
      <rect x="146" y="660" width="6" height="6"/>
      <rect x="164" y="660" width="6" height="6"/>

      <rect x="92"  y="700" width="6" height="6"/>
      <rect x="110" y="700" width="6" height="6" fill="#475569"/>
      <rect x="128" y="700" width="6" height="6"/>
      <rect x="146" y="700" width="6" height="6"/>
      <rect x="164" y="700" width="6" height="6"/>

      <rect x="92"  y="740" width="6" height="6"/>
      <rect x="110" y="740" width="6" height="6"/>
      <rect x="128" y="740" width="6" height="6" fill="#475569"/>
      <rect x="146" y="740" width="6" height="6"/>
      <rect x="164" y="740" width="6" height="6"/>

      <rect x="92"  y="780" width="6" height="6" fill="#475569"/>
      <rect x="110" y="780" width="6" height="6"/>
      <rect x="128" y="780" width="6" height="6"/>
      <rect x="146" y="780" width="6" height="6"/>
      <rect x="164" y="780" width="6" height="6" fill="#475569"/>

      <rect x="92"  y="820" width="6" height="6"/>
      <rect x="110" y="820" width="6" height="6"/>
      <rect x="128" y="820" width="6" height="6"/>
      <rect x="146" y="820" width="6" height="6"/>
      <rect x="164" y="820" width="6" height="6"/>
    </g>

    <!-- Stepped tower -->
    <rect x="200" y="510" width="6" height="6" opacity="0.85"/>
    <rect x="216" y="510" width="6" height="6" opacity="0.7"/>
    <rect x="232" y="510" width="6" height="6" opacity="0.85"/>
    <rect x="252" y="510" width="6" height="6" opacity="0.9"/>
    <rect x="200" y="550" width="6" height="6" opacity="0.7"/>
    <rect x="232" y="550" width="6" height="6" opacity="0.9"/>
    <rect x="252" y="550" width="6" height="6" opacity="0.6"/>
    <rect x="216" y="590" width="6" height="6" opacity="0.85"/>
    <rect x="252" y="590" width="6" height="6" opacity="0.85"/>
    <rect x="200" y="630" width="6" height="6" opacity="0.7"/>
    <rect x="232" y="630" width="6" height="6" opacity="0.85"/>
    <rect x="216" y="670" width="6" height="6" opacity="0.85"/>
    <rect x="252" y="710" width="6" height="6" opacity="0.9"/>
    <rect x="200" y="750" width="6" height="6" opacity="0.7"/>
    <rect x="232" y="790" width="6" height="6" opacity="0.85"/>
    <rect x="216" y="830" width="6" height="6" opacity="0.85"/>

    <!-- Modern building -->
    <rect x="290" y="510" width="6" height="6" opacity="0.85"/>
    <rect x="310" y="510" width="6" height="6" opacity="0.7"/>
    <rect x="290" y="560" width="6" height="6" opacity="0.6"/>
    <rect x="320" y="560" width="6" height="6" opacity="0.85"/>
    <rect x="290" y="620" width="6" height="6" opacity="0.85"/>
    <rect x="320" y="680" width="6" height="6" opacity="0.85"/>
    <rect x="290" y="740" width="6" height="6" opacity="0.7"/>
    <rect x="320" y="800" width="6" height="6" opacity="0.85"/>

    <!-- Mid-rise -->
    <rect x="358" y="570" width="6" height="6" opacity="0.7"/>
    <rect x="378" y="570" width="6" height="6" opacity="0.85"/>
    <rect x="396" y="570" width="6" height="6" opacity="0.6"/>
    <rect x="358" y="610" width="6" height="6" opacity="0.85"/>
    <rect x="378" y="610" width="6" height="6" opacity="0.7"/>
    <rect x="396" y="650" width="6" height="6" opacity="0.85"/>
    <rect x="378" y="690" width="6" height="6" opacity="0.85"/>
    <rect x="358" y="730" width="6" height="6" opacity="0.7"/>
    <rect x="396" y="770" width="6" height="6" opacity="0.85"/>
    <rect x="378" y="810" width="6" height="6" opacity="0.6"/>

    <!-- Tall thin -->
    <rect x="426" y="470" width="6" height="6" opacity="0.85"/>
    <rect x="446" y="470" width="6" height="6" opacity="0.6"/>
    <rect x="426" y="510" width="6" height="6" opacity="0.85"/>
    <rect x="446" y="550" width="6" height="6" opacity="0.7"/>
    <rect x="426" y="590" width="6" height="6" opacity="0.85"/>
    <rect x="446" y="630" width="6" height="6" opacity="0.85"/>
    <rect x="426" y="670" width="6" height="6" opacity="0.6"/>
    <rect x="446" y="710" width="6" height="6" opacity="0.85"/>
    <rect x="426" y="750" width="6" height="6" opacity="0.85"/>
    <rect x="446" y="790" width="6" height="6" opacity="0.7"/>
    <rect x="426" y="830" width="6" height="6" opacity="0.85"/>

    <!-- Twin towers -->
    <rect x="478" y="540" width="6" height="6" opacity="0.85"/>
    <rect x="498" y="540" width="6" height="6" opacity="0.7"/>
    <rect x="478" y="600" width="6" height="6" opacity="0.85"/>
    <rect x="498" y="660" width="6" height="6" opacity="0.85"/>
    <rect x="478" y="720" width="6" height="6" opacity="0.7"/>
    <rect x="498" y="780" width="6" height="6" opacity="0.85"/>

    <rect x="526" y="510" width="6" height="6" opacity="0.85"/>
    <rect x="546" y="510" width="6" height="6" opacity="0.6"/>
    <rect x="526" y="560" width="6" height="6" opacity="0.85"/>
    <rect x="546" y="620" width="6" height="6" opacity="0.85"/>
    <rect x="526" y="680" width="6" height="6" opacity="0.7"/>
    <rect x="546" y="740" width="6" height="6" opacity="0.85"/>
    <rect x="526" y="800" width="6" height="6" opacity="0.85"/>

    <!-- Endcap -->
    <rect x="572" y="590" width="6" height="6" opacity="0.85"/>
    <rect x="588" y="650" width="6" height="6" opacity="0.7"/>
    <rect x="572" y="730" width="6" height="6" opacity="0.85"/>
    <rect x="588" y="800" width="6" height="6" opacity="0.85"/>
  </g>

  <!-- Bottom vignette -->
  <rect width="600" height="900" fill="url(#vignette)"/>
</svg>
