<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Architectural blueprint pattern">
  <defs>
    <!-- Soft blue-to-white background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>

    <!-- Faint grid (blueprint feel) -->
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#3b82f6" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <!-- Bottom fade -->
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#eff6ff" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="900" fill="url(#bg)"/>
  <rect width="600" height="900" fill="url(#grid)"/>

  <!-- Architectural line-art: stylized building cluster, no fill, only strokes -->
  <g fill="none" stroke="#1d4ed8" stroke-opacity="0.18" stroke-width="1.5" stroke-linejoin="round">
    <!-- Tall building -->
    <rect x="120" y="240" width="100" height="520"/>
    <line x1="120" y1="290" x2="220" y2="290"/>
    <line x1="120" y1="340" x2="220" y2="340"/>
    <line x1="120" y1="390" x2="220" y2="390"/>
    <line x1="120" y1="440" x2="220" y2="440"/>
    <line x1="120" y1="490" x2="220" y2="490"/>
    <line x1="120" y1="540" x2="220" y2="540"/>
    <line x1="120" y1="590" x2="220" y2="590"/>
    <line x1="120" y1="640" x2="220" y2="640"/>
    <line x1="120" y1="690" x2="220" y2="690"/>
    <line x1="170" y1="240" x2="170" y2="760"/>

    <!-- Mid-height building -->
    <rect x="240" y="340" width="120" height="420"/>
    <line x1="240" y1="400" x2="360" y2="400"/>
    <line x1="240" y1="460" x2="360" y2="460"/>
    <line x1="240" y1="520" x2="360" y2="520"/>
    <line x1="240" y1="580" x2="360" y2="580"/>
    <line x1="240" y1="640" x2="360" y2="640"/>
    <line x1="240" y1="700" x2="360" y2="700"/>
    <line x1="280" y1="340" x2="280" y2="760"/>
    <line x1="320" y1="340" x2="320" y2="760"/>

    <!-- Smaller building -->
    <rect x="380" y="420" width="90" height="340"/>
    <line x1="380" y1="480" x2="470" y2="480"/>
    <line x1="380" y1="540" x2="470" y2="540"/>
    <line x1="380" y1="600" x2="470" y2="600"/>
    <line x1="380" y1="660" x2="470" y2="660"/>
    <line x1="425" y1="420" x2="425" y2="760"/>

    <!-- Ground line -->
    <line x1="60" y1="760" x2="540" y2="760" stroke-width="2"/>
  </g>

  <!-- Compass / measurement marks (top-right) -->
  <g fill="none" stroke="#1d4ed8" stroke-opacity="0.14" stroke-width="1">
    <circle cx="470" cy="160" r="60"/>
    <circle cx="470" cy="160" r="42"/>
    <line x1="470" y1="90" x2="470" y2="230"/>
    <line x1="400" y1="160" x2="540" y2="160"/>
  </g>

  <!-- Annotation tick marks along ground -->
  <g stroke="#1d4ed8" stroke-opacity="0.18" stroke-width="1">
    <line x1="80"  y1="780" x2="80"  y2="788"/>
    <line x1="140" y1="780" x2="140" y2="788"/>
    <line x1="200" y1="780" x2="200" y2="788"/>
    <line x1="260" y1="780" x2="260" y2="788"/>
    <line x1="320" y1="780" x2="320" y2="788"/>
    <line x1="380" y1="780" x2="380" y2="788"/>
    <line x1="440" y1="780" x2="440" y2="788"/>
    <line x1="500" y1="780" x2="500" y2="788"/>
  </g>

  <!-- Bottom fade to keep feature cards readable when overlaid -->
  <rect width="600" height="900" fill="url(#fade)"/>
</svg>
